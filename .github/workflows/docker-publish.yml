name: Build and Push Backend IA to Docker Hub

on:
  push:
    branches:
      - Marcos_branch
    paths:
      - "backend-ia-perros/**"
  # Permite ejecutar este flujo de trabajo de forma manual desde la pestaña de Actions en GitHub
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código fuente del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Docker Buildx (herramienta recomendada para compilaciones eficientes y multi-plataforma)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Iniciar sesión en Docker Hub usando los Secrets del repositorio
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Compilar y subir la imagen Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-ia-perros
          file: ./backend-ia-perros/Dockerfile
          push: true
          # Genera dos tags: uno con la etiqueta 'latest' y otro único con el SHA del commit
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/petsense-backend-ia:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/petsense-backend-ia:${{ github.sha }}
          # Utiliza caché de GitHub Actions para acelerar las compilaciones subsiguientes
          cache-from: type=gha
          cache-to: type=gha,mode=max
